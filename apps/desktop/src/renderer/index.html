<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      The packaged app loads over file://, where 'self' is an opaque origin and
      does NOT match the bundled ./assets/*.js — Chromium would block the
      renderer script entirely (blank window). Adding the `file:` scheme source
      lets the local bundle load in production while still forbidding remote code.
      'unsafe-eval' is required by Excalidraw's runtime.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' file: data: blob:; img-src 'self' file: data: blob:; style-src 'self' file: 'unsafe-inline'; font-src 'self' file: data:; script-src 'self' file: 'unsafe-inline' 'unsafe-eval' blob:; connect-src 'self' file: data: blob:; worker-src 'self' file: blob:"
    />
    <title>Notate Viewer</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
