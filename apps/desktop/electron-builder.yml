appId: com.notate.excalidraw
productName: Notate Viewer
# Pinned because electron is hoisted to the workspace root and electron-builder
# can't infer the version from the app-local node_modules.
electronVersion: 33.4.11
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
# NOTE: intentionally NO fileAssociations — the installed app does not register
# as a handler for .notate or any other file type.
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
  artifactName: ${productName}-${version}-${arch}.${ext}
win:
  target:
    - nsis
linux:
  target:
    - AppImage
  category: Graphics
